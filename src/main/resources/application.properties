spring.config.import=optional:file:.env[.properties]

spring.data.mongodb.uri=${MONGODB_URI}

spring.application.name=PoliticaNegocio

spring.data.mongodb.auto-index-creation=true

spring.data.mongodb.database=ibpms

server.port=${PORT:8080}

logging.level.org.springframework.data.mongodb=DEBUG

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXP_MS:900000}
jwt.refresh-token-expiration-days=${JWT_REFRESH_EXP_DAYS:7}

# AWS S3
aws.s3.bucket=parcial1-archivos
aws.s3.region=us-east-1

