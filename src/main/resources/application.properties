spring.config.import=optional:file:.env[.properties]

spring.data.mongodb.uri=${MONGODB_URI}

spring.application.name=PoliticaNegocio

spring.data.mongodb.auto-index-creation=true

spring.data.mongodb.database=ibpms

server.port=${PORT:8080}

logging.level.org.springframework.data.mongodb=DEBUG

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXP_MS:900000}
jwt.refresh-token-expiration-days=${JWT_REFRESH_EXP_DAYS:7}

# AWS S3
aws.s3.bucket=parcial1-archivos
aws.s3.region=us-east-1

# ibpms_ml — Python ML/DL microservice (agent classification + speech-to-text)
# Use 127.0.0.1 (not "localhost"): uvicorn binds IPv4 only, and the JVM resolves
# "localhost" to IPv6 ::1 first on Windows, which uvicorn refuses → spurious 503.
ibpms.ml.url=${IBPMS_ML_URL:http://127.0.0.1:8001}

# ibpms_ia — Python Gemini microservice (diagrams, forms, dynamic report interpretation)
ibpms.ia.url=${IBPMS_IA_URL:http://127.0.0.1:8000}

# OnlyOffice Document Server (RF-1.10 — collaborative Office editing)
# document-server-url: where the browser loads the editor API (and where this backend
#   reaches the DS to download saved files in the callback).
# callback-base-url: this backend's URL as seen FROM the Document Server container
#   (host.docker.internal on Docker Desktop). Used to build the editor callbackUrl.
# jwt-secret: shared secret to sign/verify editor config and callbacks. Leave blank to
#   disable JWT (only for a DS started with JWT_ENABLED=false in local dev).
onlyoffice.document-server-url=${ONLYOFFICE_DS_URL:http://localhost:8082}
onlyoffice.callback-base-url=${ONLYOFFICE_CALLBACK_BASE:http://host.docker.internal:3000}
onlyoffice.jwt-secret=${ONLYOFFICE_JWT_SECRET:ibpms-onlyoffice-secret-change-me}

# Multipart — allow voice audio clips (agent speech-to-text)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Firebase Admin SDK
# Set this env var to the path of your firebase service account JSON file,
# or leave unset — the app will start without push notifications (graceful degradation).
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# ─────────────────────────────────────────────────────────────────────────────
# DEMO DATA SEEDER
# When true, on startup it WIPES all policies/instances/tasks/documents and
# regenerates a coherent demo dataset (3 active policies + realistic completed/
# active/cancelled processes) so the analytics KPIs have data to show.
# Employees get a department assigned; users themselves are preserved.
#
# IMPORTANT: set this back to false after the first run, otherwise your own
# test data will be erased on every restart.
# ─────────────────────────────────────────────────────────────────────────────
ibpms.demo-seed=${IBPMS_DEMO_SEED:false}

